---
- name: Install k3s (server)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -sfL https://get.k3s.io | \
        INSTALL_K3S_CHANNEL="{{ k3s_channel }}" \
        K3S_KUBECONFIG_MODE="644" \
        INSTALL_K3S_EXEC="server \
          --disable=traefik \
          --disable=local-storage \
          --node-ip={{ node_ip.stdout }} \
          --advertise-address={{ node_ip.stdout }} \
          --flannel-iface={{ default_interface.stdout }} \
          {% for san in k3s_tls_sans %}--tls-san={{ san }} {% endfor %}\
          {% for label in k3s_node_labels | default([]) %}--node-label={{ label }} {% endfor %}\
          --node-name={{ inventory_hostname }} \
          --write-kubeconfig-mode=644" \
        sh -s -
    executable: /bin/bash
  args:
    creates: /usr/local/bin/k3s
  become: true

- name: Ensure k3s service is enabled and started
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
  become: true

# k3s が起動時に /var/lib/rancher/k3s/server/node-token を生成する。
# これを fact 化して agent ノードの K3S_TOKEN に伝搬する。
- name: Read node-token generated by k3s server
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token_raw
  become: true

- name: Set k3s_token fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_node_token_raw.content | b64decode | trim }}"
  become: false

- name: Create .kube directory in the user's home
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.kube"
    state: directory
    mode: "0700"
  become: false

- name: Copy admin.conf to user's tmp directory
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/tmp/config"
    owner: "{{ ansible_facts.env.USER }}"
    group: "{{ ansible_facts.env.USER }}"
    mode: "0644"
    remote_src: true
  changed_when: false
  become: true

- name: Copy tmp to user's .kube directory
  ansible.builtin.copy:
    src: /tmp/config
    dest: "{{ ansible_facts.env.HOME }}/.kube/config"
    owner: "{{ ansible_facts.env.USER }}"
    group: "{{ ansible_facts.env.USER }}"
    mode: "0600"
    remote_src: true
  become: false

- name: Remove tmp files
  ansible.builtin.file:
    path: /tmp/config
    state: absent
  changed_when: false
  become: true
