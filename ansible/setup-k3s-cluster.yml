---
# file: setup-k3s-cluster.yml
# 新 3 ノードクラスタ (server x1 + agent x2) のセットアップ。
# `k3s_cluster` (children: k3s_server, k3s_agent) を対象にする。
- name: Gather facts and apply node-common config to all cluster nodes
  hosts: k3s_cluster
  roles:
    - node_facts
    - node_common

- name: Install k3s server and helm / juicefs CLI
  hosts: k3s_server
  roles:
    - helm_cli
    - juicefs_cli
    - k3s_server

- name: Join k3s agents to the cluster
  hosts: k3s_agent
  roles:
    - node_facts
    - k3s_agent

- name: Bootstrap cluster (gateway-api crd / cert-manager / traefik gateway / argocd / juicefs csi / app secrets)
  hosts: k3s_server
  roles:
    - cluster_gateway_api
    - cluster_cert_manager
    - cluster_traefik
    - cluster_argocd
    - cluster_juicefs_csi
    - cluster_app_secrets
  tasks:
    # Job (helm-install-* / pre-sync hook 等) の Pod は完了後に status.phase=Succeeded
    # で残り、`type=Ready` condition は False (reason: PodCompleted) のままになるため、
    # Succeeded フェーズの Pod を field-selector で除外してから Ready=True 以外を探す。
    - name: Wait for all non-completed pods to be Ready
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          not_ready=$(kubectl get pods -A \
            --field-selector=status.phase!=Succeeded \
            -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}:{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' \
            | grep -v ':True$' || true)
          if [ -n "$not_ready" ]; then
            echo "$not_ready" >&2
            exit 1
          fi
        executable: /bin/bash
      register: pods_check
      until: pods_check.rc == 0
      retries: 60
      delay: 10
      changed_when: false
      become: false
