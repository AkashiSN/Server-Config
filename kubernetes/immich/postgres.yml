apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: immich-postgres
  name: immich-postgres
  namespace: immich
spec:
  replicas: 1
  serviceName: immich-postgres
  selector:
    matchLabels:
      app: immich-postgres
  template:
    metadata:
      labels:
        app: immich-postgres
    spec:
      containers:
        - name: immich-postgres
          image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3@sha256:23895db38dd685c158a7dde37577bdabc83116b6109aed95dbe2965413cf9210
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: TZ
              value: Asia/Tokyo
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD_FILE
              value: /secrets/immich_postgres_user_password
            - name: POSTGRES_DB
              value: immich
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: immich-secrets
              mountPath: /secrets
          startupProbe:
            exec:
              command:
              - /usr/local/bin/healthcheck.sh
            periodSeconds: 10        # 起動中は10秒ごと
            failureThreshold: 30     # 最大5分待つ (公式の start_period: 5m 相当)
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
              - /usr/local/bin/healthcheck.sh
            periodSeconds: 10        # immich-server がすぐ繋げるように短く
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
              - /usr/local/bin/healthcheck.sh
            periodSeconds: 300       # 重いクエリなのでここは公式の 5m を維持
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: immich-secrets
          secret:
            secretName: immich-secrets
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOncePod
        storageClassName: local-storage
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: immich-postgres
  name: immich-postgres
  namespace: immich
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app: immich-postgres
