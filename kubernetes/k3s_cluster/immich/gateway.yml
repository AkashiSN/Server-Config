apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: immich
  namespace: immich
  annotations:
    # cert-manager Gateway shim が listener の certificateRefs (immich-cert) を見て、
    # 同 namespace の Secret として Certificate を自動発行する。
    cert-manager.io/cluster-issuer: letsencrypt-cluster-issuer
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: photos.akashisn.info
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: immich-cert
      allowedRoutes:
        namespaces:
          from: Same
