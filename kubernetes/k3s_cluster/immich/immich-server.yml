apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: immich-server
  name: immich-server
  namespace: immich
spec:
  selector:
    matchLabels:
      app: immich-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  replicas: 1
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:v2.7.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2283
              name: immich-server
          envFrom:
            - configMapRef:
                name: immich-env
          env:
            - name: IMMICH_WORKERS_INCLUDE
              value: api
          volumeMounts:
            - name: immich-photos
              mountPath: /data
            - name: immich-secrets
              mountPath: /secrets
          startupProbe:
            exec:
              command:
              - immich-healthcheck
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
              - immich-healthcheck
            periodSeconds: 30
          livenessProbe:
            exec:
              command:
              - immich-healthcheck
            periodSeconds: 30
      volumes:
        - name: immich-secrets
          projected:
            sources:
              - secret:
                  name: immich-secrets
        - name: immich-photos
          persistentVolumeClaim:
            claimName: immich-photos-pvc
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: immich-server
  name: immich-server
  namespace: immich
spec:
  ports:
    - name: immich-server
      port: 2283
      targetPort: immich-server
  selector:
    app: immich-server
---
# Immich の大ファイル upload (request body 受信が長時間継続) や重い処理待ち
# (backend からの応答ヘッダ到達が遅い) は、Traefik HelmChartConfig の
# entryPoints / serversTransport で default 86400s に設定済みなのでカバーされる。
# 旧 nginx の `proxy-request-buffering: off` 相当も Traefik default (request streaming) で済む。
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: immich
spec:
  parentRefs:
    - name: immich
      sectionName: https
  hostnames:
    - photos.akashisn.info
  rules:
    - backendRefs:
        - name: immich-server
          port: 2283
